<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aegis Chronos | Pomodoro System</title>
    <style>
        :root {
            --bg: #0a0a0c;
            --surface: #141418;
            --primary: #4f46e5;
            --secondary: #ec4899;
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --work-color: #4f46e5;
            --break-color: #10b981;
            --ring-size: 280px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        
        body {
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            transition: background-color 0.8s ease;
        }

        .container {
            background: var(--surface);
            padding: 2rem;
            border-radius: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            width: 360px;
            position: relative;
            z-index: 10;
        }

        .timer-display {
            position: relative;
            width: var(--ring-size);
            height: var(--ring-size);
            margin: 0 auto 2rem;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        svg {
            position: absolute;
            top: 0;
            left: 0;
            transform: rotate(-90deg);
        }

        .ring-bg {
            fill: none;
            stroke: #2d2d35;
            stroke-width: 8;
        }

        .ring-progress {
            fill: none;
            stroke: var(--primary);
            stroke-width: 8;
            stroke-linecap: round;
            transition: stroke 0.5s ease;
        }

        .time-text {
            font-size: 3.5rem;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            letter-spacing: -2px;
        }

        .controls {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-bottom: 2rem;
        }

        button {
            background: #2d2d35;
            border: none;
            color: white;
            padding: 0.8rem 1.5rem;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        button:hover { background: #3d3d47; transform: translateY(-2px); }
        button:active { transform: translateY(0); }
        button.primary { background: var(--primary); }

        .settings-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            text-align: left;
        }

        .setting-group label {
            display: block;
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-bottom: 0.4rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input {
            background: #2d2d35;
            border: 1px solid #3d3d47;
            color: white;
            padding: 0.5rem;
            width: 100%;
            border-radius: 8px;
            outline: none;
        }

        .mode-indicator {
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.8rem;
        }

        /* Adaptive UX: subtle glow based on mode */
        .mode-work { --primary: var(--work-color); }
        .mode-break { --primary: var(--break-color); }

    </style>
</head>
<body class="mode-work">

    <div class="container">
        <div id="mode-label" class="mode-indicator">Focus Phase</div>
        
        <div class="timer-display">
            <svg width="280" height="280">
                <circle class="ring-bg" cx="140" cy="140" r="130"></circle>
                <circle id="progress-ring" class="ring-progress" cx="140" cy="140" r="130"></circle>
            </svg>
            <div id="time-display" class="time-text">25:00</div>
        </div>

        <div class="controls">
            <button id="toggle-btn" class="primary">Start</button>
            <button id="reset-btn">Reset</button>
        </div>

        <div class="settings-grid">
            <div class="setting-group">
                <label>Work (Min)</label>
                <input type="number" id="work-input" value="25" min="1" max="99">
            </div>
            <div class="setting-group">
                <label>Break (Min)</label>
                <input type="number" id="break-input" value="5" min="1" max="99">
            </div>
        </div>
    </div>

<script>
    /**
     * AEGIS CHRONOS SYSTEM ENGINE
     * Heuristic-based Pomodoro Implementation
     */

    const State = {
        IDLE: 'idle',
        RUNNING: 'running',
        PAUSED: 'paused'
    };

    const Mode = {
        WORK: 'work',
        BREAK: 'break'
    };

    class PomodoroEngine {
        constructor() {
            this.state = State.IDLE;
            this.mode = Mode.WORK;
            
            // System Config
            this.workDuration = 25 * 60;
            this.breakDuration = 5 * 60;
            this.currentTime = this.workDuration;
            
            // Timing Precision
            this.lastTick = 0;
            this.accumulator = 0;
            
            // DOM Elements
            this.ui = {
                display: document.getElementById('time-display'),
                ring: document.getElementById('progress-ring'),
                toggleBtn: document.getElementById('toggle-btn'),
                resetBtn: document.getElementById('reset-btn'),
                workInput: document.getElementById('work-input'),
                breakInput: document.getElementById('break-input'),
                modeLabel: document.getElementById('mode-label')
            };

            // Progress Ring Setup
            this.radius = 130;
            this.circumference = 2 * Math.PI * this.radius;
            this.ui.ring.style.strokeDasharray = `${this.circumference} ${this.circumference}`;
            
            this.init();
        }

        init() {
            this.ui.toggleBtn.addEventListener('click', () => this.toggle());
            this.ui.resetBtn.addEventListener('click', () => this.reset());
            
            const updateSettings = () => {
                this.workDuration = parseInt(this.ui.workInput.value) * 60 || 1;
                this.breakDuration = parseInt(this.ui.breakInput.value) * 60 || 1;
                if (this.state === State.IDLE) {
                    this.currentTime = (this.mode === Mode.WORK) ? this.workDuration : this.breakDuration;
                    this.updateUI();
                }
            };

            this.ui.workInput.addEventListener('change', updateSettings);
            this.ui.breakInput.addEventListener('change', updateSettings);

            requestAnimationFrame((t) => this.loop(t));
            this.updateUI();
        }

        toggle() {
            if (this.state === State.RUNNING) {
                this.state = State.PAUSED;
                this.ui.toggleBtn.textContent = 'Resume';
            } else {
                this.state = State.RUNNING;
                this.lastTick = performance.now();
                this.ui.toggleBtn.textContent = 'Pause';
            }
        }

        reset() {
            this.state = State.IDLE;
            this.mode = Mode.WORK;
            this.currentTime = this.workDuration;
            this.ui.toggleBtn.textContent = 'Start';
            document.body.className = 'mode-work';
            this.updateUI();
        }

        loop(now) {
            if (this.state === State.RUNNING) {
                const dt = (now - this.lastTick) / 1000;
                this.lastTick = now;
                
                this.currentTime -= dt;

                if (this.currentTime <= 0) {
                    this.handlePhaseComplete();
                }
                
                this.updateUI();
            }
            requestAnimationFrame((t) => this.loop(t));
        }

        handlePhaseComplete() {
            this.notify();
            if (this.mode === Mode.WORK) {
                this.mode = Mode.BREAK;
                this.currentTime = this.breakDuration;
                document.body.className = 'mode-break';
                this.ui.modeLabel.textContent = 'Rest Phase';
            } else {
                this.mode = Mode.WORK;
                this.currentTime = this.workDuration;
                document.body.className = 'mode-work';
                this.ui.modeLabel.textContent = 'Focus Phase';
            }
        }

        updateUI() {
            // Text Display
            const mins = Math.floor(Math.max(0, this.currentTime) / 60);
            const secs = Math.floor(Math.max(0, this.currentTime) % 60);
            this.ui.display.textContent = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;

            // Progress Ring
            const total = (this.mode === Mode.WORK) ? this.workDuration : this.breakDuration;
            const progress = this.currentTime / total;
            const offset = this.circumference - (progress * this.circumference);
            this.ui.ring.style.strokeDashoffset = offset;

            // Heuristic UI adaptation: Pulsing near end
            if (this.currentTime < 10 && this.state === State.RUNNING) {
                this.ui.display.style.opacity = (Math.sin(Date.now() * 0.01) * 0.5) + 0.5;
            } else {
                this.ui.display.style.opacity = 1;
            }
        }

        notify() {
            // Synthesis of notification sound via Web Audio (No external assets required)
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();

                osc.type = 'sine';
                osc.frequency.setValueAtTime(880, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(440, ctx.currentTime + 0.5);

                gain.gain.setValueAtTime(0.1, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);

                osc.connect(gain);
                gain.connect(ctx.destination);

                osc.start();
                osc.stop(ctx.currentTime + 0.5);
            } catch (e) {
                console.warn("Audio Context blocked or unsupported.");
            }
        }
    }

    // Initialization
    window.addEventListener('DOMContentLoaded', () => {
        window.Engine = new PomodoroEngine();
    });

</script>
</body>
</html>
